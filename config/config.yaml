# LikaVal configuration
# Override any value via environment variable or .env file.

ollama:
  host: "${OLLAMA_HOST:http://10.0.0.20:11434}"
  model: "${OLLAMA_MODEL:llava-phi3}"
  text_model: "${OLLAMA_TEXT_MODEL:mistral:7b}"  # text-only model for translation/cleanup
  timeout: 180  # seconds — vision inference is slower
  text_timeout: 300  # seconds — text-only calls; qwen2.5 needs ~2min to load + generate
  vision_frames: 3   # frames to extract from video for analysis
  prompts:
    summary_en: >
      You are a copywriter for a handmade ceramics brand.
      Look at this ceramic product image and write a SHORT product summary in ENGLISH.
      Include: 1 catchy title (max 8 words) and 2 sentences describing the piece
      (shape, glaze, feel, use). Be warm, poetic, and specific.
      Format your response exactly as:
      TITLE: <title>
      DESCRIPTION: <description>
    translate_ru: "Переведи на русский язык:\nНАЗВАНИЕ: {title}\nОПИСАНИЕ: {description}\n\nОтвет строго в формате:\nНАЗВАНИЕ: ...\nОПИСАНИЕ: ..."
    seo_tags: >
      Generate exactly 10 SEO tags for a handmade ceramic product described as:
      {description}
      Output ONLY a comma-separated list of lowercase tags. No numbers, no bullets, no explanation.
    etsy_listing: >
      Write a complete Etsy product listing for this handmade ceramic piece.
      Include: Title, Description (150-200 words), Materials, 13 tags.
      Be warm, artisan, and specific.
    social_post_ru: |
      Ты — Лика Вал, мастер авторской керамики из Петах-Тиквы. Пишешь посты для Facebook и Instagram
      на русском языке в своём фирменном стиле: тепло, по-настоящему, как будто рассказываешь близким подругам.

      Твой стиль (строго придерживайся):
      - Начинай с живого приветствия или фразы с эмодзи (например: "ПРИВЕТ ВСЕМ🦊" или "Ну что, девочки🏺")
      - Пиши от первого лица, как личную историю или наблюдение
      - Короткие фразы чередуй с более развёрнутыми описаниями
      - Используй многоточия "…" и переносы строк для ритма
      - Иногда растягивай слова для выразительности: "маааленькая", "оооочень"
      - Вплетай народные поговорки или образные выражения
      - Описывай детали ремесла с любовью: тип глины, глазурь, форму, ощущение
      - Заканчивай игриво или с намёком на продолжение
      - Не используй маркетинговые клише и жёсткие призывы к покупке
      - 3–5 тематических хэштегов — только в самом конце, отдельной строкой

      Образец голоса — история про студентку:
      «ПРИВЕТ ВСЕМ🦊
      Что-то я давненько ничего не рассказывала и не показывала🤦🏼‍♀️
      Так вот…
      На днях пришла ко мне на Мастер-Класс милая девочка Маша и сказала, что никогда не лепила
      из глины, только из пластилина, и то в глубоком детстве.
      И за три часа сотворила истинный шедевр👏🏻»

      Сейчас напиши пост про это изделие:
      Название: {title_ru}
      Описание: {description_ru}
      Цена: ${price_usd}
      Статус: {status}
    workshop_post_ru: |
      Ты — Лика Вал, мастер авторской керамики из Петах-Тиквы. Пишешь объявление о Мастер-Классе
      для Facebook и Instagram на русском языке.

      Твой стиль (строго придерживайся):
      - Начинай с яркого объявления заглавными буквами + эмодзи: "И СНОВА СТАРЫЕ ДОБРЫЕ МАСТЕР-КЛАССЫ🦊"
      - Пиши от первого лица, тепло и лично
      - Описывай глину как живой, магический, целебный материал
      - Говори о лепке как о пути к себе: снятие стресса, очищение мыслей, гармония, самопознание
      - Используй анафору — повторяй начало фраз для поэтического ритма ("Глина — это...", "Глина — это...")
      - Короткие и более длинные философские абзацы чередуй
      - Заканчивай медитативной или поэтической фразой
      - Мягкий призыв записаться — без давления
      - 3–5 тематических хэштегов — только в самом конце, отдельной строкой

      Образец голоса — объявление о мастер-классах:
      «И СНОВА СТАРЫЕ ДОБРЫЕ МАСТЕР-КЛАССЫ🦊
      Пришло время полечить душу.
      А общение с глиной - это как раз то лекарство, которое помогает выйти наружу всей
      отрицательной энергии, которая упала на нас в последнии две недели
      Глина - это живой материал, который обладает удивительной способностью принимать любую форму.
      Она послушна твоим рукам, реагирует на твои эмоции и тепло.
      Глина - это магический материал, который помогает познать себя, очистить свои мысли,
      снять стресс и найти гармонию.
      Лепка - это магический ритуал по совершенствованию себя.»

      Сейчас напиши объявление о мастер-классе:
      Название: {workshop_title}
      Описание: {workshop_description}
      Цена: {price}
      Детали: {details}

gdrive:
  folder_id: "${GDRIVE_FOLDER_ID:}"        # takes priority over folder_name if set
  folder_name: "${GDRIVE_FOLDER_NAME:Lika_ETSY}"  # looked up by name when folder_id is empty
  credentials_file: "${GDRIVE_CREDENTIALS_FILE:config/gdrive_credentials.json}"
  download_dir: "backend/downloads"
  supported_image_formats: [jpg, jpeg, png, webp]
  supported_video_formats: [mp4, mov]
  max_images: 10   # maximum images to download per product folder
  max_videos: 1    # maximum videos to download per product folder

currency:
  ils_to_usd_ratio: "${ILS_TO_USD_RATIO:0.80}"

github:
  token: "${GITHUB_TOKEN:}"
  repo: "${GITHUB_REPO:}"
  pages_branch: "${GITHUB_PAGES_BRANCH:gh-pages}"
  frontend_dir: "frontend"
  commit_message: "chore: auto-publish product updates"

etsy:
  username: "${ETSY_USERNAME:}"       # Etsy seller account email
  password: "${ETSY_PASSWORD:}"       # Etsy seller account password
  shop_name: "${ETSY_SHOP_NAME:}"     # Shop name slug (used to build listing URLs)
  headless: true                      # false for local debugging
  slow_mo_ms: 0                       # set ~200 for visual debugging
  session_file: "state/etsy_session.json"
  enabled: false  # set to true when credentials are configured

facebook:
  page_id: "${FACEBOOK_PAGE_ID:}"
  access_token: "${FACEBOOK_ACCESS_TOKEN:}"
  enabled: false  # set to true when credentials are configured

scheduler:
  cron: "${PUBLISH_SCHEDULE:0 2 * * *}"

state:
  dir: "state"
  products_file: "state/products.json"
  sync_log_file: "state/sync_log.json"

logging:
  dir: "logs"
  level: "INFO"
  max_bytes: 10485760   # 10 MB
  backup_count: 5

frontend:
  output_dir: "frontend"
  languages: [en, ru, he]
  default_language: en
